apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "symfony-app.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "symfony-app.name" . }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ include "symfony-app.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "symfony-app.name" . }}
    spec:
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
      - name: {{ .Values.image.pullSecret }}
      {{- end }}
      containers:
      - name: {{ include "symfony-app.name" . }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.containerPort }}
        {{- if .Values.envFrom }}
        envFrom:
        {{- if .Values.envFrom.configMapName }}
        - configMapRef:
            name: {{ .Values.envFrom.configMapName }}
        {{- end }}
        {{- if .Values.envFrom.secretName }}
        - secretRef:
            name: {{ .Values.envFrom.secretName }}
        {{- end }}
        {{- end }}
        {{- if .Values.env }}
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: {{ .Values.probes.path }}
            port: {{ .Values.containerPort }}
          initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.probes.path }}
            port: {{ .Values.containerPort }}
          initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.periodSeconds }}
        {{- if .Values.volumes }}
        volumeMounts:
        {{- range .Values.volumes }}
        {{- $name := .name }}
        {{- range .mounts }}
        - name: {{ $name }}
          mountPath: {{ .mountPath }}
          {{- if .subPath }}
          subPath: {{ .subPath }}
          {{- end }}
        {{- end }}
        {{- end }}
        {{- end }}
      {{- if .Values.volumes }}
      volumes:
      {{- range .Values.volumes }}
      - name: {{ .name }}
        persistentVolumeClaim:
          claimName: {{ .claimName }}
      {{- end }}
      {{- end }}
