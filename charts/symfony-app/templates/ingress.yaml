{{- $fullName := include "symfony-app.name" . -}}
{{- $defaultSecret := include "symfony-app.tlsSecret" . -}}
{{- $hosts := .Values.ingress.hosts -}}
{{- if not $hosts }}
{{-   $hosts = list (dict "host" .Values.ingress.host) -}}
{{- end }}
{{- /* Regroupe les hosts par secret TLS : ceux sans tlsSecretName partagent un cert SAN, les autres ont leur propre cert */ -}}
{{- $groups := dict -}}
{{- range $hosts }}
{{-   $secret := .tlsSecretName | default $defaultSecret -}}
{{-   $existing := index $groups $secret | default (list) -}}
{{-   $groups = set $groups $secret (append $existing .host) -}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
spec:
  ingressClassName: traefik
  tls:
  {{- range $secret, $hostList := $groups }}
  - hosts:
    {{- range $hostList }}
    - {{ . }}
    {{- end }}
    secretName: {{ $secret }}
  {{- end }}
  rules:
  {{- range $hosts }}
  - host: {{ .host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $fullName }}
            port:
              number: 80
  {{- end }}
{{- if .Values.ingress.redirectHosts }}
{{- $defaultRedirectSecret := printf "%s-redirect-tls" $fullName -}}
{{- /* Même regroupement que l'ingress principal : sans tlsSecretName -> cert SAN partagé, sinon cert dédié */ -}}
{{- $redirectGroups := dict -}}
{{- range .Values.ingress.redirectHosts }}
{{-   $secret := .tlsSecretName | default $defaultRedirectSecret -}}
{{-   $existing := index $redirectGroups $secret | default (list) -}}
{{-   $redirectGroups = set $redirectGroups $secret (append $existing .host) -}}
{{- end }}
---
# Middleware Traefik : 301 vers redirectTarget en conservant path + query.
# Le groupe (.*) capture tout après le host (path + ?query).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $fullName }}-redirect
  namespace: {{ .Release.Namespace }}
spec:
  redirectRegex:
    regex: "^https?://[^/]+(.*)"
    replacement: "{{ .Values.ingress.redirectTarget }}${1}"
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-redirect
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ $fullName }}-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  {{- range $secret, $hostList := $redirectGroups }}
  - hosts:
    {{- range $hostList }}
    - {{ . }}
    {{- end }}
    secretName: {{ $secret }}
  {{- end }}
  rules:
  {{- range .Values.ingress.redirectHosts }}
  - host: {{ .host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $fullName }}
            port:
              number: 80
  {{- end }}
{{- end }}