# Nom de l'application
name: my-app

# Image Docker
image:
  repository: ghcr.io/vmedias/my-app
  tag: staging
  pullPolicy: Always
  pullSecret: ghcr-secret

# Replicas
replicas: 2

# Port du container
containerPort: 80

# Ingress
ingress:
  host: my-app.dev.vmedias.fr
  clusterIssuer: letsencrypt-prod
  tlsSecretName: ""

# Ressources
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Probes
probes:
  path: /
  initialDelaySeconds: 15
  periodSeconds: 10

# Variables d'environnement inline
env: {}

# Variables d'environnement depuis ConfigMap ou Secret
envFrom: {}
# envFrom:
#   configMapName: my-app-env
#   secretName: my-app-secrets

# Worker Symfony Messenger (php bin/console messenger:consume)
worker:
  enabled: false
  command: ["php", "bin/console", "messenger:consume", "async", "--time-limit=3600", "--memory-limit=128M"]
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Scheduler Symfony (php bin/console scheduler:run)
scheduler:
  enabled: false
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
