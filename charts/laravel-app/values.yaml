# Nom de l'application
name: my-app

# Image Docker
image:
  repository: ghcr.io/vmedias/my-app
  tag: staging
  pullPolicy: Always
  # Vide par défaut : le pull ghcr passe par registries.yaml au niveau node k3s.
  # Renseigner uniquement si pull via un Secret docker-registry dans le namespace.
  pullSecret: ""

# Replicas
replicas: 2

# Port du container
containerPort: 80

# Ingress
ingress:
  clusterIssuer: letsencrypt-prod

  # Mono-domaine (rétro-compatible)
  host: my-app.dev.vmedias.fr
  tlsSecretName: ""

  # Multi-domaines : si renseigné, remplace `host`.
  # Sans tlsSecretName -> les hosts partagent un seul cert SAN (<name>-tls).
  # Avec tlsSecretName -> ce host a son propre cert (séparation possible).
  hosts: []
  # hosts:
  #   - host: app.vmedias.fr
  #   - host: www.vmedias.fr
  #   - host: legacy.vmedias.fr
  #     tlsSecretName: legacy-vmedias-fr-tls

# Ressources
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Probes (Laravel expose /up par défaut depuis Laravel 10)
probes:
  path: /up
  initialDelaySeconds: 15
  periodSeconds: 10

# Variables d'environnement inline
env: {}

# Variables d'environnement depuis ConfigMap ou Secret
# Si configMapName / secretName est renseigné et que la ressource n'existe pas
# encore dans le cluster, le chart la crée avec une donnée factice (PLACEHOLDER).
# Ensuite il n'y touche plus (helm.sh/resource-policy: keep) : éditer manuellement.
envFrom: {}
# envFrom:
#   configMapName: my-app-env
#   secretName: my-app-secrets

# Volumes (PVC)
volumes: []
# volumes:
#   - name: storage
#     claimName: my-app-storage
#     mounts:
#       - mountPath: /var/www/html/storage
#         subPath: storage

# Worker de queue Laravel
worker:
  enabled: false
  command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Scheduler Laravel (php artisan schedule:run)
scheduler:
  enabled: false
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
