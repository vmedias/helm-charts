# Nom de l'application
name: my-app

# Image Docker
image:
  repository: ghcr.io/vmedias/my-app
  tag: staging
  pullPolicy: Always
  pullSecret: ghcr-secret

# Replicas
replicas: 2

# Port du container
containerPort: 3000

# Ingress
ingress:
  host: my-app.dev.vmedias.fr
  clusterIssuer: letsencrypt-prod
  tlsSecretName: ""

# Ressources
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Probes
probes:
  path: /
  initialDelaySeconds: 10
  periodSeconds: 10

# Variables d'environnement inline
env: {}

# Variables d'environnement depuis ConfigMap ou Secret
# Si configMapName / secretName est renseigné et que la ressource n'existe pas
# encore dans le cluster, le chart la crée avec une donnée factice (PLACEHOLDER).
# Ensuite il n'y touche plus (helm.sh/resource-policy: keep) : éditer manuellement.
envFrom: {}
# envFrom:
#   configMapName: my-app-env
#   secretName: my-app-secrets

# Volumes (PVC)
volumes: []
# volumes:
#   - name: data
#     claimName: my-app-data
#     mounts:
#       - mountPath: /app/data
#         subPath: data
